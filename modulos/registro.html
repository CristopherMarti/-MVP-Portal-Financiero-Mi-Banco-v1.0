<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro — Mi Banco</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>

<div class="auth-wrapper">
  <div class="card auth-card p-4">

    <div class="text-center mb-4">
      <i class="bi bi-bank2 text-primary" style="font-size:2.5rem"></i>
      <div class="auth-logo mt-2">MI BANCO</div>
      <p class="text-muted small">Crear nueva cuenta</p>
    </div>

    <!-- Alerta éxito / error -->
    <div id="alertSuccess" class="alert alert-success d-none">
      <i class="bi bi-check-circle me-2"></i>
      Cuenta creada. <a href="/index.html" class="alert-link">Inicia sesión aquí.</a>
    </div>
    <div id="alertError" class="alert alert-danger d-none">
      <i class="bi bi-exclamation-triangle me-2"></i>
      <span id="alertMsg"></span>
    </div>

    <form id="formRegistro" novalidate>

      <div class="mb-3">
        <label class="form-label fw-semibold">Nombre completo</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" id="nombre" class="form-control"
                 placeholder="Ej: María García López" required minlength="3">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Correo electrónico</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" id="email" class="form-control"
                 placeholder="correo@ejemplo.com" required>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" id="password" class="form-control"
                 placeholder="Mínimo 8 caracteres" required minlength="8">
        </div>
        <div class="form-text">Usa al menos 8 caracteres con letras y números.</div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Confirmar contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" id="passwordConfirm" class="form-control"
                 placeholder="Repite tu contraseña" required minlength="8">
        </div>
        <div id="pwdMismatch" class="text-danger small d-none mt-1">
          <i class="bi bi-x-circle me-1"></i>Las contraseñas no coinciden.
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" id="btnRegistro">
        <span id="btnText"><i class="bi bi-person-plus me-2"></i>Crear cuenta</span>
        <span id="btnSpinner" class="d-none">
          <span class="spinner-border spinner-border-sm me-2"></span>Registrando...
        </span>
      </button>
    </form>

    <hr class="my-3">
    <p class="text-center small text-muted mb-0">
      ¿Ya tienes cuenta?
      <a href="/index.html" class="text-primary fw-semibold">Inicia sesión</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  console.log('Registro cargado (desvinculado - sin Supabase)');
</script>
</body>
</html>
